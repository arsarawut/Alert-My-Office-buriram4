services:
  - type: web
    name: check-myoffice-news
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MYOFFICE_STATE_PATH
        value: /tmp/seen_news.json
      - key: MYOFFICE_LOCK_PATH
        value: /tmp/check_myoffice_news.lock
      - key: RUN_WEBHOOK_TOKEN
        generateValue: true
      - key: MYOFFICE_ARCHIVED_MAX_PAGES
        value: 0
